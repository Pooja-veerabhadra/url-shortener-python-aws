<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #FF9900;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #e68a00; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            display: none;
        }
        a { color: #FF9900; word-break: break-all; }
    </style>
</head>
<body>
    <h1>🔗 URL Shortener</h1>
    <p style="text-align:center;color:#666">
        Built with Python + AWS DynamoDB
    </p>

    <input
        type="url"
        id="urlInput"
        placeholder="Paste your long URL here..."
    />
    <button onclick="shortenURL()">Shorten URL</button>

    <div id="result">
        <p><strong>Short URL:</strong></p>
        <a id="shortUrl" href="#" target="_blank"></a>
        <br><br>
        <button onclick="copyURL()"
            style="background:#333; width:auto; padding:8px 20px">
            Copy URL
        </button>
    </div>

    <script>
        async function shortenURL() {
            const url = document.getElementById('urlInput').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            const response = await fetch('/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const data = await response.json();

            document.getElementById('shortUrl').href = data.short_url;
            document.getElementById('shortUrl').textContent = data.short_url;
            document.getElementById('result').style.display = 'block';
        }

        function copyURL() {
            const url = document.getElementById('shortUrl').textContent;
            navigator.clipboard.writeText(url);
            alert('Copied to clipboard!');
        }
    </script>
</body>
</html>
